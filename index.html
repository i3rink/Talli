  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="manifest" href="manifest.json" />
  <title>Annick — Stock Check</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <script src="https://apis.google.com/js/api.js"></script>
  <script src="https://accounts.google.com/gsi/client"></script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    /* ── Version: 2.2.0 ── */

    :root {
      --teal:        #0075ab;
      --teal-light:  #cce8f4;
      --teal-dark:   #005f8a;
      --teal-faint:  #f0f8fd;
      --red:         #ef4444;
      --amber:       #f59e0b;
      --green:       #10b981;
      --bg:          #f8fafc;
      --surface:     #ffffff;
      --border:      #e2e8f0;
      --text:        #0f172a;
      --muted:       #64748b;
      --radius:      12px;
      --shadow:      0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.06);
      --shadow-lg:   0 4px 24px rgba(0,0,0,.10);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Hanken Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.5;
    }

    /* dot-grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, #cbd5e1 1px, transparent 1px);
      background-size: 24px 24px;
      opacity: .45;
      pointer-events: none;
      z-index: 0;
    }

    #app {
      position: relative;
      z-index: 1;
      max-width: 780px;
      margin: 0 auto;
      padding: 24px 16px 80px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
    }
    .header-logo-wrap {
      flex-shrink: 0;
      width: 160px;
      height: 44px;
      display: flex;
      align-items: center;
    }
    .header-logo-svg {
      width: 160px;
      height: auto;
      display: block;
    }
    .header-divider {
      width: 1px;
      height: 36px;
      background: var(--border);
      flex-shrink: 0;
    }
    .header-text span {
      font-size: .8rem;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }
    .card-title {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 600;
      font-size: .9rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      margin-bottom: 14px;
    }

    /* ── Upload zone ── */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 28px 20px;
      text-align: center;
      transition: border-color .2s, background .2s;
      cursor: pointer;
      position: relative;
    }
    .upload-zone.drag-over {
      border-color: var(--teal);
      background: var(--teal-faint);
    }
    .upload-zone p {
      color: var(--muted);
      font-size: .9rem;
      margin-bottom: 14px;
    }
    .upload-zone p strong {
      display: block;
      color: var(--text);
      font-size: 1rem;
      margin-bottom: 4px;
    }
    #file-input { display: none; }

    /* ── Button styles ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 10px 18px;
      border-radius: 8px;
      font-family: 'Hanken Grotesk', sans-serif;
      font-size: .88rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background .15s, transform .1s, opacity .15s;
      text-decoration: none;
      white-space: nowrap;
    }
    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .btn-primary {
      background: var(--teal);
      color: #fff;
    }
    .btn-primary:hover:not(:disabled) { background: var(--teal-dark); }

    .btn-outline {
      background: transparent;
      color: var(--teal);
      border: 1.5px solid var(--teal);
    }
    .btn-outline:hover:not(:disabled) { background: var(--teal-faint); }

    .btn-ghost {
      background: var(--bg);
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover:not(:disabled) { background: var(--border); color: var(--text); }

    .btn-danger {
      background: var(--red);
      color: #fff;
    }

    /* upload button row */
    .upload-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-top: 4px;
    }

    /* ── Google Drive button ── */
    .btn-drive {
      background: #fff;
      color: #3c4043;
      border: 1.5px solid #dadce0;
      font-weight: 600;
    }
    .btn-drive:hover:not(:disabled) { background: #f8f9fa; border-color: #4285f4; }
    .btn-drive svg { flex-shrink: 0; }

    /* ── Drive auth status badge ── */
    .drive-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: .78rem;
      color: var(--muted);
      margin-top: 10px;
      justify-content: center;
    }
    .drive-status .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
    }
    .drive-status.authed .dot { background: var(--green); }
    .drive-status.authed { color: var(--green); }

    /* ── Session block ── */
    .session-row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .session-code {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--teal);
      letter-spacing: .08em;
      flex: 1;
    }

    /* ── Item list ── */
    .item-list { display: flex; flex-direction: column; gap: 6px; }
    .item-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: .875rem;
    }
    .item-name { flex: 1; font-weight: 500; }
    .item-qty { color: var(--muted); font-size: .8rem; white-space: nowrap; }
    .item-status {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .status-btn {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      border: 1.5px solid var(--border);
      background: transparent;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .12s, border-color .12s;
    }
    .status-btn.active-green  { background: #d1fae5; border-color: var(--green); }
    .status-btn.active-amber  { background: #fef3c7; border-color: var(--amber); }
    .status-btn.active-red    { background: #fee2e2; border-color: var(--red); }

    .item-row.status-in   { background: #f0fdf4; border-color: #bbf7d0; }
    .item-row.status-part { background: #fffbeb; border-color: #fde68a; }
    .item-row.status-short{ background: #fef2f2; border-color: #fecaca; }

    .qty-input {
      width: 64px;
      padding: 4px 8px;
      border: 1.5px solid var(--amber);
      border-radius: 6px;
      font-family: 'Hanken Grotesk', sans-serif;
      font-size: .85rem;
      text-align: center;
      outline: none;
    }
    .qty-input:focus { border-color: var(--teal); }

    /* ── Tags ── */
    .job-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: .75rem;
      font-weight: 600;
      background: var(--teal-light);
      color: var(--teal-dark);
      margin-right: 4px;
      margin-bottom: 2px;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text);
      color: #fff;
      padding: 10px 20px;
      border-radius: 99px;
      font-size: .85rem;
      font-weight: 500;
      z-index: 999;
      transition: transform .25s ease;
      white-space: nowrap;
      pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Shortfall table ── */
    .shortfall-table {
      width: 100%;
      border-collapse: collapse;
      font-size: .85rem;
    }
    .shortfall-table th {
      text-align: left;
      padding: 6px 8px;
      color: var(--muted);
      font-weight: 600;
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: .05em;
      border-bottom: 1px solid var(--border);
    }
    .shortfall-table td {
      padding: 8px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    .shortfall-table tr:last-child td { border-bottom: none; }
    .need { color: var(--red); font-weight: 600; }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; }
    .tab-btn {
      padding: 7px 16px;
      border-radius: 99px;
      border: 1.5px solid var(--border);
      background: transparent;
      font-family: 'Hanken Grotesk', sans-serif;
      font-size: .85rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
    }
    .tab-btn.active {
      background: var(--teal);
      border-color: var(--teal);
      color: #fff;
    }

    /* ── Progress bar ── */
    .progress-bar-wrap {
      background: var(--border);
      border-radius: 99px;
      height: 6px;
      margin-bottom: 14px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--teal);
      border-radius: 99px;
      transition: width .3s ease;
    }

    /* ── Misc ── */
    .text-muted { color: var(--muted); }
    .text-sm { font-size: .82rem; }
    .mt-2 { margin-top: 8px; }
    .mt-4 { margin-top: 16px; }
    .flex { display: flex; }
    .gap-2 { gap: 8px; }
    .flex-wrap { flex-wrap: wrap; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .w-full { width: 100%; }

    .empty-state {
      text-align: center;
      padding: 32px 20px;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 10px; }

    /* ── Loading spinner ── */
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 520px) {
      .item-row { flex-wrap: wrap; }
      .session-code { font-size: 1.3rem; }
      .header-logo-wrap { width: 120px; }
      .header-logo-svg { width: 120px; }
    }
  </style>
</head>

  /* ═══════════════════════════════════════════════
     GOOGLE DRIVE PICKER
  ═══════════════════════════════════════════════ */
  function loadPickerApi() {
    return new Promise(resolve => {
      if (state.pickerApiLoaded) { resolve(); return; }
      gapi.load('picker', () => { state.pickerApiLoaded = true; resolve(); });
    });
  }

  function getOAuthToken() {
    return new Promise((resolve, reject) => {
      if (state.driveToken) { resolve(state.driveToken); return; }
      const tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: GOOGLE_CLIENT_ID,
        scope: 'https://www.googleapis.com/auth/drive.readonly',
        callback: resp => {
          if (resp.error) { reject(resp.error); return; }
          state.driveToken  = resp.access_token;
          state.driveAuthed = true;
          render();
          resolve(resp.access_token);
        },
      });
      tokenClient.requestAccessToken({ prompt: state.driveAuthed ? '' : 'consent' });
    });
  }

  function showPicker(token) {
    return new Promise((resolve) => {
      const view = new google.picker.DocsView(google.picker.ViewId.DOCS)
        .setMimeTypes('application/pdf')
        .setMode(google.picker.DocsViewMode.LIST);
      const picker = new google.picker.PickerBuilder()
        .setAppId(GOOGLE_APP_ID)
        .setOAuthToken(token)
        .setDeveloperKey(GOOGLE_API_KEY)
        .addView(view)
        .setTitle('Select packing slip PDFs')
        .enableFeature(google.picker.Feature.MULTISELECT_ENABLED)
        .setCallback(data => {
          if (data.action === google.picker.Action.PICKED)  { resolve(data.docs); }
          else if (data.action === google.picker.Action.CANCEL) { resolve([]); }
        })
        .build();
      picker.setVisible(true);
    });
  }

  async function downloadDriveFile(fileId, token) {
    const resp = await fetch(
      `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,
      { headers: { Authorization: `Bearer ${token}` } }
    );
    if (!resp.ok) throw new Error(`Drive download failed: ${resp.status}`);
    return resp.blob();
  }

  async function handleDrivePick() {
    try {
      await loadPickerApi();
      const token = await getOAuthToken();
      const docs  = await showPicker(token);
      if (!docs.length) return;
      toast(`Downloading ${docs.length} file${docs.length > 1 ? 's' : ''} from Drive…`, 5000);
      const files = await Promise.all(
        docs.map(async doc => {
          const blob = await downloadDriveFile(doc.id, token);
          return new File([blob], doc.name, { type: 'application/pdf' });
        })
      );
      handleFiles(files);
    } catch (err) {
      console.error('Drive pick error:', err);
      if (String(err).includes('401') || String(err).includes('invalid_token')) {
        state.driveToken  = null;
        state.driveAuthed = false;
        toast('Drive session expired — please sign in again');
        render();
      } else {
        toast('Could not load from Google Drive. Try again.');
      }
    }
  }

  /* ═══════════════════════════════════════════════
     FILE HANDLING + PDF PARSING
  ═══════════════════════════════════════════════ */
  let pendingFiles = [];

  async function handleFiles(files) {
    if (!files.length) return;
    pendingFiles = files;
    const listEl = document.getElementById('file-list');
    if (listEl) {
      listEl.innerHTML = files.map(f =>
        `<div class="flex gap-2 items-center text-sm mt-2"><span>📄</span><span>${esc(f.name)}</span></div>`
      ).join('');
    }
    const prog = document.getElementById('parse-progress');
    if (prog) prog.style.display = '';

    const allItems = [];
    const jobs     = new Set();

    for (let i = 0; i < files.length; i++) {
      setProgress(Math.round((i / files.length) * 80), `Parsing ${files[i].name}…`);
      try {
        const { items, jobRef } = await parsePDF(files[i]);
        items.forEach(item => allItems.push(item));
        if (jobRef) jobs.add(jobRef);
      } catch (err) {
        console.error('Parse error:', files[i].name, err);
        toast(`Could not parse ${files[i].name}`);
      }
    }

    setProgress(90, 'Consolidating…');
    const masterList = consolidate(allItems);
    setProgress(100, 'Done!');

    const session = await createSession(masterList, [...jobs]);
    state.session = session;
    state.checks  = {};
    state.view    = 'session';
    setTimeout(() => render(), 400);
  }

  function setProgress(pct, label) {
    const fill = document.getElementById('progress-fill');
    const lbl  = document.getElementById('progress-label');
    if (fill) fill.style.width = pct + '%';
    if (lbl)  lbl.textContent  = label;
  }

  async function parsePDF(file) {
    const arrayBuffer = await file.arrayBuffer();
    const pdf  = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    let text   = '';
    for (let p = 1; p <= pdf.numPages; p++) {
      const page    = await pdf.getPage(p);
      const content = await page.getTextContent();
      text += content.items.map(i => i.str).join(' ') + '\n';
    }
    return parsePackingSlipText(text, file.name);
  }

  function parsePackingSlipText(text, filename) {
    const jobMatch = filename.match(/(\d{4,})/);
    const jobRef   = jobMatch ? jobMatch[1] : filename.replace('.pdf', '');
    const items    = [];
    const lines    = text.split('\n');
    const qtyFirst = /^(\d+)\s+x?\s+(.+)/i;
    const qtyLast  = /^(.+?)\s{2,}(\d+)\s*$/;
    const kitExpand = { KIT2S: ['Shower tray', 'Waste fitting', 'Fixing kit'], KIT1E: ['End panel', 'Fixing kit'] };
    for (const raw of lines) {
      const line = raw.trim();
      if (!line || line.length < 4) continue;
      if (/mull collection supply/i.test(line)) continue;
      const m1 = line.match(qtyFirst);
      const m2 = line.match(qtyLast);
      let name, qty;
      if (m1) { qty = parseInt(m1[1], 10); name = m1[2].trim(); }
      else if (m2) { name = m2[1].trim(); qty = parseInt(m2[2], 10); }
      else { continue; }
      if (!name || isNaN(qty) || qty < 1) continue;
      const kitKey = Object.keys(kitExpand).find(k => name.toUpperCase().includes(k));
      if (kitKey) { kitExpand[kitKey].forEach(sub => items.push({ name: sub, qty, job: jobRef })); }
      else { items.push({ name, qty, job: jobRef }); }
    }
    return { items, jobRef };
  }

  function consolidate(allItems) {
    const map = new Map();
    for (const item of allItems) {
      const key = item.name.toLowerCase().replace(/\s+/g, ' ').trim();
      if (map.has(key)) {
        const ex = map.get(key);
        ex.qty += item.qty;
        if (item.job && !ex.jobs.includes(item.job)) ex.jobs.push(item.job);
      } else {
        map.set(key, { key, name: item.name, qty: item.qty, jobs: item.job ? [item.job] : [] });
      }
    }
    return [...map.values()].sort((a, b) => a.name.localeCompare(b.name));
  }

  /* ═══════════════════════════════════════════════
     SUPABASE — sessions & checks
  ═══════════════════════════════════════════════ */
  async function createSession(masterList, jobs) {
    const code = generateCode();
    const { data, error } = await sb.from('sessions').insert({
      code, master_list: masterList, jobs, created_at: new Date().toISOString(),
    }).select().single();
    if (error) {
      console.error('Session create error:', error);
      toast('Could not save session — working offline');
      return { id: 'local', code, masterList, jobs };
    }
    subscribeToChecks(data.id);
    return { id: data.id, code, masterList, jobs };
  }

  async function joinSession(code) {
    const { data, error } = await sb.from('sessions').select('*').eq('code', code).single();
    if (error || !data) { toast('Session not found — check the code'); return; }
    state.session = { id: data.id, code: data.code, masterList: data.master_list, jobs: data.jobs };
    state.checks  = {};
    state.role    = 'warehouse';
    state.view    = 'check';
    const { data: existingChecks } = await sb.from('checks')
      .select('*').eq('session_id', data.id).order('created_at', { ascending: false });
    if (existingChecks) {
      const seen = new Set();
      for (const c of existingChecks) {
        if (!seen.has(c.item_key) && c.status && c.status !== 'unchecked') {
          seen.add(c.item_key);
          state.checks[c.item_key] = { status: c.status, haveQty: c.have_qty };
        }
      }
    }
    subscribeToChecks(data.id);
    render();
  }

  function subscribeToChecks(sessionId) {
    sb.channel('checks-' + sessionId)
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'checks',
          filter: `session_id=eq.${sessionId}` }, payload => {
        const c = payload.new;
        if (c.status && c.status !== 'unchecked') {
          state.checks[c.item_key] = { status: c.status, haveQty: c.have_qty };
        }
        if (state.view === 'check') render();
      })
      .subscribe();
  }

  async function setStatus(key, status) {
    if (state.checks[key]?.status === status) { delete state.checks[key]; }
    else { state.checks[key] = { status }; }
    render();
    await pushCheck(key);
  }

  async function pushCheck(key) {
    if (!state.session?.id || state.session.id === 'local') return;
    const c = state.checks[key];
    await sb.from('checks').insert({
      session_id: state.session.id,
      item_key:   key,
      status:     c?.status || null,
      have_qty:   c?.haveQty || null,
      created_at: new Date().toISOString(),
    });
  }

  /* ═══════════════════════════════════════════════
     REPORT — copy to clipboard
  ═══════════════════════════════════════════════ */
  function copyReport() {
    const items  = state.session.masterList;
    const checks = state.checks;
    const shorts = items.filter(i => {
      const c = checks[i.key];
      return c && (c.status === 'short' || c.status === 'part');
    });
    if (!shorts.length) { toast('Nothing to order — all in stock!'); return; }
    const lines = ['ANNICK BATHROOMS — PURCHASING REPORT', `Session: ${state.session.code}`,
      `Generated: ${new Date().toLocaleString('en-GB')}`, '',
      'Item | Needed | Have | To Order | Jobs', '─'.repeat(60),
      ...shorts.map(item => {
        const c    = checks[item.key];
        const have = c.status === 'part' ? (Number(c.haveQty) || 0) : 0;
        return `${item.name} | ${item.qty} | ${have} | ${item.qty - have} | ${(item.jobs || []).join(', ')}`;
      }),
    ];
    navigator.clipboard.writeText(lines.join('\n')).then(() => toast('Report copied to clipboard!'));
  }

  /* ═══════════════════════════════════════════════
     UTILITIES
  ═══════════════════════════════════════════════ */
  function generateCode() {
    const now = new Date();
    const yy  = String(now.getFullYear()).slice(2);
    const mm  = String(now.getMonth() + 1).padStart(2, '0');
    const n   = Math.floor(Math.random() * 9) + 1;
    return `AB-${yy}${mm}-${n}`;
  }

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  /* ═══════════════════════════════════════════════
     INIT
  ═══════════════════════════════════════════════ */
  render();

})();
</script>
</body>
