<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0075ab" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="manifest" href="manifest.json" />
  <title>Annick — Stock Check</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Google APIs -->
  <script src="https://apis.google.com/js/api.js"></script>
  <script src="https://accounts.google.com/gsi/client"></script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    /* ── Version: 2.2.0 ── */

    :root {
      --teal:        #0075ab;
      --teal-light:  #cce8f4;
      --teal-dark:   #005f8a;
      --teal-faint:  #f0f8fd;
      --red:         #ef4444;
      --amber:       #f59e0b;
      --green:       #10b981;
      --bg:          #f8fafc;
      --surface:     #ffffff;
      --border:      #e2e8f0;
      --text:        #0f172a;
      --muted:       #64748b;
      --radius:      12px;
      --shadow:      0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.06);
      --shadow-lg:   0 4px 24px rgba(0,0,0,.10);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Hanken Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.5;
    }

    /* dot-grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, #cbd5e1 1px, transparent 1px);
      background-size: 24px 24px;
      opacity: .45;
      pointer-events: none;
      z-index: 0;
    }

    #app {
      position: relative;
      z-index: 1;
      max-width: 780px;
      margin: 0 auto;
      padding: 24px 16px 80px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
    }
    .header-logo-wrap {
      flex-shrink: 0;
      width: 160px;
      height: 44px;
      display: flex;
      align-items: center;
    }
    .header-logo-svg {
      width: 160px;
      height: auto;
      display: block;
    }
    .header-divider {
      width: 1px;
      height: 36px;
      background: var(--border);
      flex-shrink: 0;
    }
    .header-text span {
      font-size: .8rem;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }
    .card-title {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 600;
      font-size: .9rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      margin-bottom: 14px;
    }

    /* ── Upload zone ── */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 28px 20px;
      text-align: center;
      transition: border-color .2s, background .2s;
      cursor: pointer;
      position: relative;
    }
    .upload-zone.drag-over {
      border-color: var(--teal);
      background: var(--teal-faint);
    }
    .upload-zone p {
      color: var(--muted);
      font-size: .9rem;
      margin-bottom: 14px;
    }
    .upload-zone p strong {
      display: block;
      color: var(--text);
      font-size: 1rem;
      margin-bottom: 4px;
    }
    #file-input { display: none; }

    /* ── Button styles ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 10px 18px;
      border-radius: 8px;
      font-family: 'Hanken Grotesk', sans-serif;
      font-size: .88rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background .15s, transform .1s, opacity .15s;
      text-decoration: none;
      white-space: nowrap;
    }
    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .btn-primary {
      background: var(--teal);
      color: #fff;
    }
    .btn-primary:hover:not(:disabled) { background: var(--teal-dark); }

    .btn-outline {
      background: transparent;
      color: var(--teal);
      border: 1.5px solid var(--teal);
    }
    .btn-outline:hover:not(:disabled) { background: var(--teal-faint); }

    .btn-ghost {
      background: var(--bg);
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover:not(:disabled) { background: var(--border); color: var(--text); }

    .btn-danger {
      background: var(--red);
      color: #fff;
    }

    /* upload button row */
    .upload-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-top: 4px;
    }

    /* ── Google Drive button ── */
    .btn-drive {
      background: #fff;
      color: #3c4043;
      border: 1.5px solid #dadce0;
      font-weight: 600;
    }
    .btn-drive:hover:not(:disabled) { background: #f8f9fa; border-color: #4285f4; }
    .btn-drive svg { flex-shrink: 0; }

    /* ── Drive auth status badge ── */
    .drive-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: .78rem;
      color: var(--muted);
      margin-top: 10px;
      justify-content: center;
    }
    .drive-status .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
    }
    .drive-status.authed .dot { background: var(--green); }
    .drive-status.authed { color: var(--green); }

    /* ── Session block ── */
    .session-row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .session-code {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--teal);
      letter-spacing: .08em;
      flex: 1;
    }

    /* ── Item list ── */
    .item-list { display: flex; flex-direction: column; gap: 6px; }
    .item-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: .875rem;
    }
    .item-name { flex: 1; font-weight: 500; }
    .item-qty { color: var(--muted); font-size: .8rem; white-space: nowrap; }
    .item-status {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .status-btn {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      border: 1.5px solid var(--border);
      background: transparent;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .12s, border-color .12s;
    }
    .status-btn.active-green  { background: #d1fae5; border-color: var(--green); }
    .status-btn.active-amber  { background: #fef3c7; border-color: var(--amber); }
    .status-btn.active-red    { background: #fee2e2; border-color: var(--red); }

    .item-row.status-in   { background: #f0fdf4; border-color: #bbf7d0; }
    .item-row.status-part { background: #fffbeb; border-color: #fde68a; }
    .item-row.status-short{ background: #fef2f2; border-color: #fecaca; }

    .qty-input {
      width: 64px;
      padding: 4px 8px;
      border: 1.5px solid var(--amber);
      border-radius: 6px;
      font-family: 'Hanken Grotesk', sans-serif;
      font-size: .85rem;
      text-align: center;
      outline: none;
    }
    .qty-input:focus { border-color: var(--teal); }

    /* ── Tags ── */
    .job-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: .75rem;
      font-weight: 600;
      background: var(--teal-light);
      color: var(--teal-dark);
      margin-right: 4px;
      margin-bottom: 2px;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text);
      color: #fff;
      padding: 10px 20px;
      border-radius: 99px;
      font-size: .85rem;
      font-weight: 500;
      z-index: 999;
      transition: transform .25s ease;
      white-space: nowrap;
      pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Shortfall table ── */
    .shortfall-table {
      width: 100%;
      border-collapse: collapse;
      font-size: .85rem;
    }
    .shortfall-table th {
      text-align: left;
      padding: 6px 8px;
      color: var(--muted);
      font-weight: 600;
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: .05em;
      border-bottom: 1px solid var(--border);
    }
    .shortfall-table td {
      padding: 8px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    .shortfall-table tr:last-child td { border-bottom: none; }
    .need { color: var(--red); font-weight: 600; }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 4px; margin-bottom: 16px; flex-wrap: wrap; }
    .tab-btn {
      padding: 7px 16px;
      border-radius: 99px;
      border: 1.5px solid var(--border);
      background: transparent;
      font-family: 'Hanken Grotesk', sans-serif;
      font-size: .85rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
    }
    .tab-btn.active {
      background: var(--teal);
      border-color: var(--teal);
      color: #fff;
    }

    /* ── Progress bar ── */
    .progress-bar-wrap {
      background: var(--border);
      border-radius: 99px;
      height: 6px;
      margin-bottom: 14px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--teal);
      border-radius: 99px;
      transition: width .3s ease;
    }

    /* ── Misc ── */
    .text-muted { color: var(--muted); }
    .text-sm { font-size: .82rem; }
    .mt-2 { margin-top: 8px; }
    .mt-4 { margin-top: 16px; }
    .flex { display: flex; }
    .gap-2 { gap: 8px; }
    .flex-wrap { flex-wrap: wrap; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .w-full { width: 100%; }

    .empty-state {
      text-align: center;
      padding: 32px 20px;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 10px; }

    /* ── Loading spinner ── */
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 520px) {
      .item-row { flex-wrap: wrap; }
      .session-code { font-size: 1.3rem; }
      .header-logo-wrap { width: 120px; }
      .header-logo-svg { width: 120px; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <div class="header">
    <div class="header-logo-wrap">
      <!-- NOTE: the full inlined Annick Group wordmark SVG lives here in the live file.
           Trimmed in this reference copy for readability. Pull the exact <svg> block
           from the deployed index.html (or annick-logo.svg) when integrating. -->
      <img class="header-logo-svg" src="annick-logo.svg" alt="Annick Group" />
    </div>
    <div class="header-divider"></div>
    <div class="header-text">
      <span>Stock Check &mdash; v2.2.1</span>
    </div>
  </div>

  <div id="root"></div>

</div>

<div id="toast"></div>

<script>
'use strict';
/* ════════════════════════════════════════════════════════════════════
   Annick Stock Check — Pick Verifier
   Version: 2.2.1
   Change from 2.2.0: restored the SKU-aware packing-slip parser from the
   Friday (v2.0.1) build. PDF text is rebuilt into proper lines, the SKU on
   the line beneath each item is captured, bundles (KIT2S/KIT1E) expand into
   parts, and the Mull/Bute catalogue row is skipped. SKU now shows on every
   stock-check row and in the purchasing report. Google Drive picker, real-time
   sync, session flow and header are unchanged from 2.2.0.

   ════════════════════════════════════════════════════════════════════ */
(function () {

  /* ═══════════════════════════════════════════════
     CONFIG
  ═══════════════════════════════════════════════ */
  const SUPABASE_URL    = 'https://jlqonolsenwyipgqgmfr.supabase.co';
  const SUPABASE_ANON   = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpscW9ub2xzZW53eWlwZ3FnbWZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NzE1NTgsImV4cCI6MjA5NjI0NzU1OH0.dJC8G4UO9o2-oS42Hdb9GCGn_1RsoXB1fsrVODShoo0';
  const GOOGLE_API_KEY    = 'AIzaSyC1xZlmMOBxQlviDK_FgO0LMy1yXpR4vvo';
  const GOOGLE_CLIENT_ID  = '26423864329-ppbhqq86bca9juj6ro4bh0oh2m6nv8b7.apps.googleusercontent.com';
  const GOOGLE_APP_ID     = '26423864329';

  /* ═══════════════════════════════════════════════
     SUPABASE
  ═══════════════════════════════════════════════ */
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  /* ═══════════════════════════════════════════════
     STATE
  ═══════════════════════════════════════════════ */
  let state = {
    view: 'upload',
    session: null,
    checks: {},
    role: 'office',
    tab: 'all',
    driveAuthed: false,
    driveToken: null,
    pickerApiLoaded: false,
    pickerInitted: false,
  };

  /* ═══════════════════════════════════════════════
     PDF.js setup
  ═══════════════════════════════════════════════ */
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  /* ═══════════════════════════════════════════════
     SKU pill styling (injected so no separate CSS edit is needed)
  ═══════════════════════════════════════════════ */
  (function injectStyle() {
    const s = document.createElement('style');
    s.textContent =
      '.item-sku{font-family:monospace;background:var(--bg);border:1px solid var(--border);' +
      'border-radius:4px;padding:1px 6px;font-size:11px;margin-left:8px;color:var(--text-muted);white-space:nowrap}' +
      '.report-sku{font-family:monospace;font-size:12px;color:var(--muted)}';
    document.head.appendChild(s);
  })();

  /* ═══════════════════════════════════════════════
     TOAST
  ═══════════════════════════════════════════════ */
  let toastTimer;
  function toast(msg, duration = 2800) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), duration);
  }

  /* ═══════════════════════════════════════════════
     RENDER
  ═══════════════════════════════════════════════ */
  function render() {
    const root = document.getElementById('root');
    if (state.view === 'upload')  root.innerHTML = renderUpload();
    if (state.view === 'session') root.innerHTML = renderSession();
    if (state.view === 'check')   root.innerHTML = renderCheck();
    if (state.view === 'report')  root.innerHTML = renderReport();
    bindEvents();
  }

  /* ───────────────────────────────────────────────
     UPLOAD VIEW
  ─────────────────────────────────────────────── */
  function renderUpload() {
    const driveStatusHtml = state.driveAuthed
      ? `<div class="drive-status authed"><span class="dot"></span>Connected to Google Drive</div>`
      : `<div class="drive-status"><span class="dot"></span>Not connected to Google Drive</div>`;

    return `
      <div class="card">
        <div class="card-title">New Stock Check Session</div>
        <div class="upload-zone" id="drop-zone">
          <p>
            <strong>Upload Packing Slips</strong>
            Drag &amp; drop PDF files here, or use the buttons below
          </p>
          <div class="upload-btns">
            <button class="btn btn-primary" data-action="browse-files">
              📄 Choose Files
            </button>
            <button class="btn btn-drive" data-action="drive-pick">
              ${driveIcon()} Upload from Google Drive
            </button>
          </div>
          ${driveStatusHtml}
        </div>
        <input type="file" id="file-input" accept="application/pdf" multiple />
        <div id="file-list" class="mt-4"></div>
        <div id="parse-progress" style="display:none" class="mt-4">
          <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
          <p class="text-muted text-sm" id="progress-label">Parsing PDFs…</p>
        </div>
      </div>
      <div class="card" id="join-card">
        <div class="card-title">Join a Session (Warehouse)</div>
        <div class="flex gap-2 flex-wrap items-center">
          <input id="join-code" type="text" placeholder="Enter session code e.g. AB-2506-1"
            style="flex:1;min-width:160px;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:.95rem;outline:none;" />
          <button class="btn btn-outline" data-action="join-session">Join →</button>
        </div>
      </div>
    `;
  }

  function driveIcon() {
    return `<svg width="18" height="18" viewBox="0 0 87.3 78" xmlns="http://www.w3.org/2000/svg">
      <path d="m6.6 66.85 3.85 6.65c.8 1.4 1.95 2.5 3.3 3.3l13.75-23.8h-27.5c0 1.55.4 3.1 1.2 4.5z" fill="#0066da"/>
      <path d="m43.65 25-13.75-23.8c-1.35.8-2.5 1.9-3.3 3.3l-25.4 44a9.06 9.06 0 0 0 -1.2 4.5h27.5z" fill="#00ac47"/>
      <path d="m73.55 76.8c1.35-.8 2.5-1.9 3.3-3.3l1.6-2.75 7.65-13.25c.8-1.4 1.2-2.95 1.2-4.5h-27.502l5.852 11.5z" fill="#ea4335"/>
      <path d="m43.65 25 13.75-23.8c-1.35-.8-2.9-1.2-4.5-1.2h-18.5c-1.6 0-3.15.45-4.5 1.2z" fill="#00832d"/>
      <path d="m59.8 53h-32.3l-13.75 23.8c1.35.8 2.9 1.2 4.5 1.2h50.8c1.6 0 3.15-.45 4.5-1.2z" fill="#2684fc"/>
      <path d="m73.4 26.5-12.7-22c-.8-1.4-1.95-2.5-3.3-3.3l-13.75 23.8 16.15 27h27.45c0-1.55-.4-3.1-1.2-4.5z" fill="#ffba00"/>
    </svg>`;
  }

  /* ───────────────────────────────────────────────
     SESSION VIEW
  ─────────────────────────────────────────────── */
  function renderSession() {
    const s = state.session;
    return `
      <div class="card">
        <div class="card-title">Session Created</div>
        <div class="session-row">
          <div class="session-code">${s.code}</div>
          <button class="btn btn-ghost" data-action="copy-code">📋 Copy Code</button>
          <button class="btn btn-primary" data-action="go-check">Start Check →</button>
        </div>
        <p class="text-muted text-sm mt-2">Share this code with the warehouse team to join on their phones.</p>
      </div>
      <div class="card">
        <div class="card-title">Jobs on this slip</div>
        <div>${s.jobs.map(j => `<span class="job-tag">${esc(j)}</span>`).join('')}</div>
        <p class="text-muted text-sm mt-2">${s.masterList.length} line items consolidated</p>
      </div>
      <button class="btn btn-ghost mt-2" data-action="back-upload">← Upload different files</button>
    `;
  }

  /* ───────────────────────────────────────────────
     CHECK VIEW  (SKU + unit now shown on each row)
  ─────────────────────────────────────────────── */
  function renderCheck() {
    const items = state.session.masterList;
    const checks = state.checks;
    const total = items.length;
    const done  = Object.values(checks).filter(c => c.status).length;
    const pct   = total ? Math.round((done / total) * 100) : 0;

    let filtered = items;
    if (state.tab === 'short') filtered = items.filter(i => checks[i.key]?.status === 'short');
    if (state.tab === 'in')    filtered = items.filter(i => checks[i.key]?.status === 'in');
    if (state.tab === 'remaining') filtered = items.filter(i => !checks[i.key]?.status);

    const rows = filtered.map(item => {
      const c = checks[item.key] || {};
      const st = c.status || '';
      const skuHtml  = item.sku ? `<span class="item-sku">${esc(item.sku)}</span>` : '';
      const unitHtml = item.unit ? ' ' + esc(item.unit) : '';
      return `
        <div class="item-row ${st ? 'status-' + (st === 'in' ? 'in' : st === 'part' ? 'part' : 'short') : ''}"
             data-key="${esc(item.key)}">
          <div class="item-name">${esc(item.name)}${skuHtml}</div>
          <div class="item-qty">Qty: ${item.qty}${unitHtml}</div>
          ${st === 'part' ? `<input class="qty-input" type="number" min="0" max="${item.qty}"
            placeholder="Have?" value="${c.haveQty || ''}" data-action="qty-input" data-key="${esc(item.key)}" />` : ''}
          <div class="item-status">
            <button class="status-btn ${st === 'in' ? 'active-green' : ''}"
              data-action="set-status" data-key="${esc(item.key)}" data-status="in" title="In stock">✓</button>
            <button class="status-btn ${st === 'part' ? 'active-amber' : ''}"
              data-action="set-status" data-key="${esc(item.key)}" data-status="part" title="Partial">~</button>
            <button class="status-btn ${st === 'short' ? 'active-red' : ''}"
              data-action="set-status" data-key="${esc(item.key)}" data-status="short" title="Short">✗</button>
          </div>
        </div>`;
    }).join('');

    return `
      <div class="card">
        <div class="flex justify-between items-center" style="margin-bottom:10px;">
          <div>
            <span class="card-title" style="margin-bottom:0;">Stock Check</span>
            <div class="text-muted text-sm">${state.session.code} · ${done}/${total} checked</div>
          </div>
          <button class="btn btn-primary" data-action="go-report">Report →</button>
        </div>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
        <div class="tabs">
          <button class="tab-btn ${state.tab === 'all' ? 'active' : ''}" data-action="tab" data-tab="all">All (${total})</button>
          <button class="tab-btn ${state.tab === 'remaining' ? 'active' : ''}" data-action="tab" data-tab="remaining">Remaining (${total - done})</button>
          <button class="tab-btn ${state.tab === 'short' ? 'active' : ''}" data-action="tab" data-tab="short">Short (${Object.values(checks).filter(c=>c.status==='short'||c.status==='part').length})</button>
          <button class="tab-btn ${state.tab === 'in' ? 'active' : ''}" data-action="tab" data-tab="in">In Stock (${Object.values(checks).filter(c=>c.status==='in').length})</button>
        </div>
        <div class="item-list">
          ${rows || `<div class="empty-state"><div class="icon">✓</div><p>Nothing here</p></div>`}
        </div>
      </div>
    `;
  }

  /* ───────────────────────────────────────────────
     REPORT VIEW  (SKU column added)
  ─────────────────────────────────────────────── */
  function renderReport() {
    const items   = state.session.masterList;
    const checks  = state.checks;
    const shorts  = items.filter(i => {
      const c = checks[i.key];
      return c && (c.status === 'short' || c.status === 'part');
    });

    const rows = shorts.map(item => {
      const c = checks[item.key];
      const have = c.status === 'part' ? (Number(c.haveQty) || 0) : 0;
      const need = item.qty - have;
      return `<tr>
        <td>${esc(item.name)}</td>
        <td class="report-sku">${item.sku ? esc(item.sku) : '—'}</td>
        <td>${item.qty}</td>
        <td>${have}</td>
        <td class="need">${need}</td>
        <td>${item.jobs ? esc(item.jobs.join(', ')) : ''}</td>
      </tr>`;
    }).join('');

    return `
      <div class="card">
        <div class="flex justify-between items-center" style="margin-bottom:16px;">
          <div class="card-title" style="margin-bottom:0;">Purchasing Report</div>
          <button class="btn btn-ghost" data-action="go-check">← Back</button>
        </div>
        ${shorts.length === 0
          ? `<div class="empty-state"><div class="icon">🎉</div><p>All items in stock — nothing to order!</p></div>`
          : `<table class="shortfall-table">
              <thead><tr>
                <th>Item</th><th>SKU</th><th>Needed</th><th>Have</th><th>To Order</th><th>Job(s)</th>
              </tr></thead>
              <tbody>${rows}</tbody>
            </table>`
        }
        <div class="flex gap-2 flex-wrap mt-4">
          <button class="btn btn-primary" data-action="copy-report">📋 Copy Report</button>
          <button class="btn btn-ghost" data-action="new-session">New Session</button>
        </div>
      </div>
    `;
  }

  /* ═══════════════════════════════════════════════
     EVENT BINDING
  ═══════════════════════════════════════════════ */
  function bindEvents() {
    const dz = document.getElementById('drop-zone');
    if (dz) {
      dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
      dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
      dz.addEventListener('drop', e => {
        e.preventDefault();
        dz.classList.remove('drag-over');
        handleFiles([...e.dataTransfer.files].filter(f => f.type === 'application/pdf'));
      });
    }
  }

  document.addEventListener('click', e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const action = btn.dataset.action;
    if (action === 'browse-files') { document.getElementById('file-input').click(); }
    if (action === 'drive-pick')   { handleDrivePick(); }
    if (action === 'join-session') {
      const code = document.getElementById('join-code').value.trim().toUpperCase();
      if (code) joinSession(code);
    }
    if (action === 'copy-code') { navigator.clipboard.writeText(state.session.code).then(() => toast('Code copied!')); }
    if (action === 'go-check')   { state.view = 'check';   render(); }
    if (action === 'go-report')  { state.view = 'report';  render(); }
    if (action === 'back-upload'){ state.view = 'upload';  render(); }
    if (action === 'new-session'){ state.session = null; state.checks = {}; state.view = 'upload'; render(); }
    if (action === 'tab')        { state.tab = btn.dataset.tab; render(); }
    if (action === 'set-status') { setStatus(btn.dataset.key, btn.dataset.status); }
    if (action === 'copy-report'){ copyReport(); }
  });

  document.addEventListener('change', e => {
    if (e.target.id === 'file-input') { handleFiles([...e.target.files]); }
    if (e.target.dataset.action === 'qty-input') {
      const key = e.target.dataset.key;
      if (state.checks[key]) {
        state.checks[key].haveQty = Number(e.target.value);
        pushCheck(key);
      }
    }
  });

  /* ═══════════════════════════════════════════════
     GOOGLE DRIVE PICKER  (unchanged from 2.2.0)
  ═══════════════════════════════════════════════ */
  function loadPickerApi() {
    return new Promise(resolve => {
      if (state.pickerApiLoaded) { resolve(); return; }
      gapi.load('picker', () => { state.pickerApiLoaded = true; resolve(); });
    });
  }

  function getOAuthToken() {
    return new Promise((resolve, reject) => {
      if (state.driveToken) { resolve(state.driveToken); return; }
      const tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: GOOGLE_CLIENT_ID,
        scope: 'https://www.googleapis.com/auth/drive.readonly',
        callback: resp => {
          if (resp.error) { reject(resp.error); return; }
          state.driveToken  = resp.access_token;
          state.driveAuthed = true;
          render();
          resolve(resp.access_token);
        },
      });
      tokenClient.requestAccessToken({ prompt: state.driveAuthed ? '' : 'consent' });
    });
  }

  function showPicker(token) {
    return new Promise((resolve) => {
      const view = new google.picker.DocsView(google.picker.ViewId.DOCS)
        .setMimeTypes('application/pdf')
        .setMode(google.picker.DocsViewMode.LIST);
      const picker = new google.picker.PickerBuilder()
        .setAppId(GOOGLE_APP_ID)
        .setOAuthToken(token)
        .setDeveloperKey(GOOGLE_API_KEY)
        .addView(view)
        .setTitle('Select packing slip PDFs')
        .enableFeature(google.picker.Feature.MULTISELECT_ENABLED)
        .setCallback(data => {
          if (data.action === google.picker.Action.PICKED)  { resolve(data.docs); }
          else if (data.action === google.picker.Action.CANCEL) { resolve([]); }
        })
        .build();
      picker.setVisible(true);
    });
  }

  async function downloadDriveFile(fileId, token) {
    const resp = await fetch(
      `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,
      { headers: { Authorization: `Bearer ${token}` } }
    );
    if (!resp.ok) throw new Error(`Drive download failed: ${resp.status}`);
    return resp.blob();
  }

  async function handleDrivePick() {
    try {
      await loadPickerApi();
      const token = await getOAuthToken();
      const docs  = await showPicker(token);
      if (!docs.length) return;
      toast(`Downloading ${docs.length} file${docs.length > 1 ? 's' : ''} from Drive…`, 5000);
      const files = await Promise.all(
        docs.map(async doc => {
          const blob = await downloadDriveFile(doc.id, token);
          return new File([blob], doc.name, { type: 'application/pdf' });
        })
      );
      handleFiles(files);
    } catch (err) {
      console.error('Drive pick error:', err);
      if (String(err).includes('401') || String(err).includes('invalid_token')) {
        state.driveToken  = null;
        state.driveAuthed = false;
        toast('Drive session expired — please sign in again');
        render();
      } else {
        toast('Could not load from Google Drive. Try again.');
      }
    }
  }

  /* ═══════════════════════════════════════════════
     FILE HANDLING
  ═══════════════════════════════════════════════ */
  async function handleFiles(files) {
    if (!files.length) return;

    const listEl = document.getElementById('file-list');
    if (listEl) {
      listEl.innerHTML = files.map(f =>
        `<div class="flex gap-2 items-center text-sm mt-2"><span>📄</span><span>${esc(f.name)}</span></div>`
      ).join('');
    }
    const prog = document.getElementById('parse-progress');
    if (prog) prog.style.display = '';

    const jobObjs = [];

    for (let i = 0; i < files.length; i++) {
      setProgress(Math.round((i / files.length) * 80), `Parsing ${files[i].name}…`);
      try {
        const job = await parseFile(files[i]);
        jobObjs.push(job);
      } catch (err) {
        console.error('Parse error:', files[i].name, err);
        toast(`Could not parse ${files[i].name}`);
      }
    }

    setProgress(90, 'Consolidating…');
    const masterList = buildMasterList(jobObjs);
    setProgress(100, 'Done!');

    const session = await createSession(masterList, jobObjs.map(j => j.id));
    state.session = session;
    state.checks  = {};
    state.view    = 'session';
    setTimeout(() => render(), 400);
  }

  function setProgress(pct, label) {
    const fill = document.getElementById('progress-fill');
    const lbl  = document.getElementById('progress-label');
    if (fill) fill.style.width = pct + '%';
    if (lbl)  lbl.textContent  = label;
  }

  /* ═══════════════════════════════════════════════
     PDF TEXT EXTRACTION + PARSER
     (restored from the Friday v2.0.1 build, faithful)
  ═══════════════════════════════════════════════ */

  // Rebuild proper lines from PDF text fragments by sorting into rows.
  async function extractPdfText(file) {
    const pdf = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
    let full = '';
    for (let p = 1; p <= pdf.numPages; p++) {
      const page    = await pdf.getPage(p);
      const content = await page.getTextContent();
      const sorted  = content.items.slice().sort((a, b) => {
        const dy = b.transform[5] - a.transform[5];
        if (Math.abs(dy) > 3) return dy;
        return a.transform[4] - b.transform[4];
      });
      const lines = []; let cur = [], lastY = null;
      for (const item of sorted) {
        const y = Math.round(item.transform[5]);
        if (lastY === null || Math.abs(y - lastY) > 3) {
          if (cur.length) lines.push(cur.map(i => i.str).join(' ').trim());
          cur = [item]; lastY = y;
        } else cur.push(item);
      }
      if (cur.length) lines.push(cur.map(i => i.str).join(' ').trim());
      full += lines.join('\n') + '\n';
    }
    return full;
  }

  async function parseFile(file) {
    const text = await extractPdfText(file);
    return parsePackingSlip(text, file.name);
  }

  const ITEM_RE  = /^(\d+)\.\s+(.+?)\s{2,}(\d+(?:\.\d+)?)\s*(pcs|bundle|box|pk|2pk|3pk|4pk|pair|roll|m|lm|set|kit|each|no\.?|nr\.?)?$/i;
  const ITEM_RE2 = /^(\d+)\.\s+(.+)\s+(\d+(?:\.\d+)?)\s*(pcs|bundle|box|pk|2pk|3pk|4pk|pair|roll|m|lm|set|kit|each)?$/i;
  const SKU_RE   = /^[A-Z0-9][A-Z0-9\-_]{2,}$/i;
  const BUNDLE_KW= /\bkit\b|\bbundle\b/i;
  const SUB_RE   = /^(\d+)x\s+(.+)$/i;
  // Catalogue description rows to skip. Add other collection names here if needed.
  const SKIP_RE  = /mull collection supply|bute collection supply/i;

  function normaliseUnit(u) {
    u = u.toLowerCase().trim();
    if (!u || u === 'no' || u === 'nr') return 'pcs';
    if (u === '2pk') return '2-pack';
    if (u === '3pk') return '3-pack';
    if (u === '4pk') return '4-pack';
    return u;
  }

  function parsePackingSlip(text, filename) {
    const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
    let jobId   = filename.replace(/\.pdf$/i, '');
    const qm    = text.match(/Quote\s*#\s*(\S+)/i);
    if (qm) jobId = `Q${qm[1]}`;

    const items = [];
    let i = 0;
    while (i < lines.length) {
      const line = lines[i];
      const m    = line.match(ITEM_RE) || line.match(ITEM_RE2);
      if (m) {
        const lineNum = parseInt(m[1]);
        const name    = m[2].trim();
        const qty     = parseFloat(m[3]);
        const unit    = normaliseUnit(m[4] || '');
        let j = i + 1, sku = '';
        if (j < lines.length && SKU_RE.test(lines[j]) && !/^\d+\.\s/.test(lines[j])) {
          sku = lines[j].toUpperCase(); j++;
        }
        if (SKIP_RE.test(name)) {
          while (j < lines.length && !/^\d+\.\s/.test(lines[j])) j++;
          i = j; continue;
        }
        if (BUNDLE_KW.test(name) || BUNDLE_KW.test(unit)) {
          const subs = [];
          while (j < lines.length && !/^\d+\.\s/.test(lines[j])) {
            const sm = lines[j].trim().match(SUB_RE);
            if (sm && sm[2].trim().length > 1) {
              subs.push({ name: sm[2].trim(), sku: '', qty: parseInt(sm[1]) * qty, unit: 'pcs',
                fromBundle: `${name}${sku ? ' (' + sku + ')' : ''}`, lineNum });
            }
            j++;
          }
          if (subs.length) subs.forEach(s => items.push(s));
          else items.push({ name, sku, qty, unit, fromBundle: null, lineNum });
        } else {
          items.push({ name, sku, qty, unit, fromBundle: null, lineNum });
        }
        i = j; continue;
      }
      i++;
    }
    return { id: jobId, name: jobId, filename, items };
  }

  // Consolidate items across slips. Key on SKU when present (case-insensitive),
  // else on name. Sums quantities and collects the jobs each item appears on.
  function buildMasterList(jobs) {
    const map = new Map();
    jobs.forEach(job => {
      job.items.forEach(item => {
        const key = item.sku ? item.sku.toUpperCase() : item.name.toLowerCase();
        if (map.has(key)) {
          const ex = map.get(key);
          ex.qty += item.qty;
          if (!ex.jobs.includes(job.id)) ex.jobs.push(job.id);
        } else {
          map.set(key, {
            key,
            name: item.name,
            sku: item.sku || '',
            qty: item.qty,
            unit: item.unit,
            fromBundle: item.fromBundle || null,
            jobs: [job.id]
          });
        }
      });
    });
    return [...map.values()].sort((a, b) => a.name.localeCompare(b.name));
  }

  /* ═══════════════════════════════════════════════
     SUPABASE — sessions & checks
  ═══════════════════════════════════════════════ */
  async function createSession(masterList, jobs) {
    const code = generateCode();
    const { data, error } = await sb.from('sessions').insert({
      code, master_list: masterList, jobs, created_at: new Date().toISOString(),
    }).select().single();
    if (error) {
      console.error('Session create error:', error);
      toast('Could not save session — working offline');
      return { id: 'local', code, masterList, jobs };
    }
    subscribeToChecks(data.id);
    return { id: data.id, code, masterList, jobs };
  }

  async function joinSession(code) {
    const { data, error } = await sb.from('sessions').select('*').eq('code', code).single();
    if (error || !data) { toast('Session not found — check the code'); return; }
    state.session = { id: data.id, code: data.code, masterList: data.master_list, jobs: data.jobs };
    state.checks  = {};
    state.role    = 'warehouse';
    state.view    = 'check';
    const { data: existingChecks } = await sb.from('checks')
      .select('*').eq('session_id', data.id).order('updated_at', { ascending: false });
    if (existingChecks) {
      const masterList = data.master_list || [];
      // Build a lookup: normalised key / sku / name -> master key (case-insensitive)
      const nameToKey = new Map();
      for (const item of masterList) {
        nameToKey.set(String(item.key).toLowerCase().trim(), item.key);
        if (item.sku) nameToKey.set(String(item.sku).toLowerCase().trim(), item.key);
        nameToKey.set(String(item.name).toLowerCase().trim(), item.key);
      }
      const seen = new Set();
      for (const c of existingChecks) {
        if (!c.status || c.status === 'unchecked') continue;
        const resolvedKey = nameToKey.get(String(c.item_key).toLowerCase().trim()) || c.item_key;
        if (!seen.has(resolvedKey)) {
          seen.add(resolvedKey);
          state.checks[resolvedKey] = { status: c.status, haveQty: c.have_qty };
        }
      }
    }
    subscribeToChecks(data.id);
    render();
  }

  function subscribeToChecks(sessionId) {
    sb.channel('checks-' + sessionId)
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'checks',
          filter: `session_id=eq.${sessionId}` }, payload => {
        const c = payload.new;
        if (c.status && c.status !== 'unchecked') {
          state.checks[c.item_key] = { status: c.status, haveQty: c.have_qty };
        }
        if (state.view === 'check') render();
      })
      .subscribe();
  }

  async function setStatus(key, status) {
    if (state.checks[key]?.status === status) { delete state.checks[key]; }
    else { state.checks[key] = { status }; }
    render();
    await pushCheck(key);
  }

  async function pushCheck(key) {
    if (!state.session?.id || state.session.id === 'local') return;
    const c = state.checks[key];
    await sb.from('checks').insert({
      session_id: state.session.id,
      item_key:   key,
      status:     c?.status || null,
      have_qty:   c?.haveQty || null,
      created_at: new Date().toISOString(),
    });
  }

  /* ═══════════════════════════════════════════════
     REPORT — copy to clipboard  (SKU included)
  ═══════════════════════════════════════════════ */
  function copyReport() {
    const items  = state.session.masterList;
    const checks = state.checks;
    const shorts = items.filter(i => {
      const c = checks[i.key];
      return c && (c.status === 'short' || c.status === 'part');
    });
    if (!shorts.length) { toast('Nothing to order — all in stock!'); return; }
    const lines = ['ANNICK BATHROOMS — PURCHASING REPORT', `Session: ${state.session.code}`,
      `Generated: ${new Date().toLocaleString('en-GB')}`, '',
      'Item | SKU | Needed | Have | To Order | Jobs', '─'.repeat(64),
      ...shorts.map(item => {
        const c    = checks[item.key];
        const have = c.status === 'part' ? (Number(c.haveQty) || 0) : 0;
        return `${item.name} | ${item.sku || ''} | ${item.qty} | ${have} | ${item.qty - have} | ${(item.jobs || []).join(', ')}`;
      }),
    ];
    navigator.clipboard.writeText(lines.join('\n')).then(() => toast('Report copied to clipboard!'));
  }

  /* ═══════════════════════════════════════════════
     UTILITIES
  ═══════════════════════════════════════════════ */
  function generateCode() {
    const now = new Date();
    const yy  = String(now.getFullYear()).slice(2);
    const mm  = String(now.getMonth() + 1).padStart(2, '0');
    const n   = Math.floor(Math.random() * 9) + 1;
    return `AB-${yy}${mm}-${n}`;
  }

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  /* ═══════════════════════════════════════════════
     INIT
  ═══════════════════════════════════════════════ */
  render();

})();

</script>
</body>
</html>
